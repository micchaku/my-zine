<!DOCTYPE html>
<html lang="ja">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Solidus Digital Zine</title>

<style>

body{
margin:0;
background:#111;
overflow:hidden;
}

.container{
display:flex;
width:100vw;
height:100vh;
overflow-x:auto;
scroll-snap-type:x mandatory;
scroll-behavior:smooth;
}

/* ページ */

.page{
flex-shrink:0;
scroll-snap-align:start;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
background:#111;
}

.page img{
height:95vh;
width:auto;
max-width:100%;
object-fit:contain;
background:white;
}

/* 縦 */

@media (orientation:portrait){

.page{
width:100vw;
}

}

/* 横 */

@media (orientation:landscape){

.page{
width:50vw;
}

/* 表紙 */
.page:first-child{
width:100vw;
}

/* 裏表紙 */
.page:last-child{
width:100vw;
}

}

</style>

</head>

<body>

<div class="container">

<div class="page"><img src="page01.jpg"></div>
<div class="page"><img src="page02.jpg"></div>
