<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Solidus Digital Zine</title>
    <script src="https://cdn.jsdelivr.net/npm/page-flip@2.0.7/dist/js/page-flip.browser.min.js"></script>
    <style>
        body { 
            background-color: #f8f8f8; 
            margin: 0; 
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden; 
        }
        #container { 
            width: 100vw; 
            height: 100vh; 
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .page { background-color: #fff; }
        .page-img { width: 100%; height: 100%; object-fit: contain; display: block; }
    </style>
</head>
<body>

<div id="container">
    <div id="book">
        </div>
</div>

<script>
    function renderBook() {
        const bookElement = document.getElementById('book');
        bookElement.innerHTML = ''; // 初期化

        // 32ページ分のHTMLを作成
        for (let i = 1; i <= 32; i++) {
            const num = i.toString().padStart(2, '0');
            const pageDiv = document.createElement('div');
            pageDiv.className = 'page';
            pageDiv.innerHTML = `<img src="page${num}.jpg" class="page-img">`;
            bookElement.appendChild(pageDiv);
        }

        const vw = window.innerWidth;
        const vh = window.innerHeight;
        
        // 縦横判定：幅が高さより小さければ「1枚モード(portrait)」、大きければ「見開きモード(landscape)」
        const mode = (vw < vh) ? 'portrait' : 'landscape';

        const pageFlip = new St.PageFlip(bookElement, {
            width: 1500,
            height: 2120,
            size: "stretch",
            showCover: true,
            drawShadow: true,
            mode: mode, 
            autoSize: true,
            mobileScrollSupport: true
        });

        pageFlip.loadFromHTML(document.querySelectorAll('.page'));
    }

    // 読み込み時と、画面回転時（サイズ変更時）に実行
    window.onload = renderBook;

    let timeout = null;
    window.addEventListener('resize', () => {
        // 回転中の連続実行を避けるため、少し待ってから実行
        clearTimeout(timeout);
        timeout = setTimeout(renderBook, 300);
    });
</script>

</body>
</html>
