<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>solidus | 4th Anniversary Special Week</title>
    <style>
        /* 基本スタイル：余白をゼロにし、背景を白に設定 */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            -webkit-text-size-adjust: 100%;
        }

        /* 画像コンテナ：画面中央に配置し、はみ出しを防止 */
        .main-container {
            position: relative;
            width: 100%;
            height: 100vh; /* 画面の高さ一杯 */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            -webkit-touch-callout: none;
            user-select: none;
            -webkit-user-select: none;
        }

        /* 画像本体：上下が切れないように最大高さを制限 */
        .protected-image {
            max-width: 100%;
            max-height: 90vh; /* スマホを横にしても上下が切れない設定 */
            width: auto;
            height: auto;
            object-fit: contain;
            pointer-events: none;
            display: block;
        }

        /* 透明なガード層 */
        .guard-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0);
            z-index: 10;
        }

        /* クーポンエリアのスタイル（ミニマル版） */
        .coupon-section {
            padding: 20px 0;
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="main-container">
        <div style="margin-bottom: 20px; text-align: center;">
            <span style="display: block; font-size: 8px; letter-spacing: 0.1em; color: #999; margin-bottom: 2px;">4th anniv. special week</span>
            <span style="display: block; font-size: 14px; letter-spacing: 0.05em; color: #000; margin-bottom: 2px; font-weight: bold;">10% OFF COUPON</span>
            <span style="display: block; font-size: 8px; color: #888; margin-bottom: 12px; letter-spacing: 0.05em;">3/11 wed - 3/17 tue</span>
            
            <div style="display: inline-block; padding: 8px 25px; background: #f7f7f7; border-radius: 2px;">
                <span style="display: block; font-size: 8px; color: #999; margin-bottom: 2px;">COUPON CODE :</span>
                <span style="display: block; font-size: 16px; font-weight: bold; letter-spacing: 0.2em; color: #000; user-select: all; -webkit-user-select: all;">solidus</span>
            </div>
            <span style="display: block; font-size: 8px; color: #aaa; margin-top: 10px;">決済画面で上記コードをご入力ください</span>
        </div>

        <div style="position: relative; display: flex; justify-content: center; align-items: center; width: 100%;">
            <img src="https://image.jimcdn.com/app/cms/image/transf/none/path/s577b754e0ee8888f/image/ifcd50c4fc7f1c5e1/version/1773384971/image.png" 
                 class="protected-image" 
                 oncontextmenu="return false;" 
                 onselectstart="return false;" 
                 onmousedown="return false;">
            <div class="guard-layer"></div>
        </div>
    </div>

    <script>
        // 右クリックとドラッグの徹底防止
        document.addEventListener('contextmenu', function(e) {
            e.preventDefault();
        }, false);

        document.addEventListener('dragstart', function(e) {
            e.preventDefault();
        }, false);
    </script>

</body>
</html>
