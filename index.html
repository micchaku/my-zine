<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Solidus Digital Zine</title>
    <style>
        body { 
            background-color: #f8f8f8; 
            margin: 0; 
            overflow: hidden; 
        }
        .container {
            width: 100vw;
            height: 100vh;
            display: flex;
            overflow-x: auto;
            scroll-snap-type: x mandatory;
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
        }
        .page {
            display: flex;
            height: 100vh;
            flex-shrink: 0;
            scroll-snap-align: start;
        }
        .page-img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            background-color: #fff;
            /* ページっぽさを出すための薄い影（左右の接続面以外に適用） */
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }

        /* --- 隙間ゼロの魔法 --- */

        /* 【縦向き】 画面幅いっぱいに1枚 */
        @media (orientation: portrait) {
            .page {
                width: 100vw;
                justify-content: center;
                align-items: center;
            }
            .page-img {
                max-width: 95%; /* 縦の時は少し余白があったほうが綺麗 */
                max-height: 90%;
            }
        }

        /* 【横向き】 画面半分に1枚 ＆ 左右をくっつける */
        @media (orientation: landscape) {
            .page {
                width: 50vw;
            }
            /* 奇数ページ（左側）は右寄せ */
            .page:nth-child(odd) {
                justify-content: flex-end;
            }
            /* 偶数ページ（右側）は左寄せ */
            .page:nth-child(even) {
                justify-content: flex-start;
            }
            .page-img {
                max-width: 100%;
                max-height: 100%; /* 横の時は上下いっぱいに表示 */
            }
        }

        .page-num {
            position: fixed;
            bottom: 25px;
            right: 25px;
            background: rgba(255,255,255,0.9);
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 12px;
            color: #333;
