<title>ZINE</title>

<style>

body{
margin:0;
background:#111;
overflow:hidden;
}

.viewer{
display:flex;
height:100vh;
overflow-x:auto;
scroll-snap-type:x mandatory;
}

.slide{
flex:0 0 100vw;
height:100vh;
display:flex;
align-items:center;
justify-content:center;
scroll-snap-align:start;
}

.slide img{
max-width:100%;
max-height:100%;
object-fit:contain;
}

/* 縦スマホ */

@media (orientation:portrait){

.landscape{
display:none;
}

}

/* 横・PC */

@media (orientation:landscape){

.portrait{
display:none;
}

}

</style>

</head>

<div class="viewer">
