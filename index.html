<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Solidus Digital Zine</title>
    <script src="https://cdn.jsdelivr.net/npm/page-flip@2.0.7/dist/js/page-flip.browser.min.js"></script>
    <style>
        body { 
            background-color: #f8f8f8; 
            margin: 0; 
            padding: 0;
            overflow: auto !important; /* ブラウザのスクロール・ズームを優先 */
        }
        .container { 
            width: 100vw; 
            height: 100vh; 
            display: flex;
            justify-content: center;
            align-items: center;
        }
        #book { box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .page { background-color: #fff; }
        .page-img { width: 100%; height: 100%; object-fit: contain; display: block; }
    </style>
</head>
<body>

<div class="container">
    <div id="book"></div>
</div>

<script>
    window.onload = () => {
        const bookElement = document.getElementById('book');
        
        // ページを生成
        for (let i = 1; i <= 32; i++) {
            const num = i.toString().padStart(2, '0');
            const pageDiv = document.createElement('div');
            pageDiv.className = 'page';
            pageDiv.innerHTML = `<img src="page${num}.jpg" class="page-img">`;
            bookElement.appendChild(pageDiv);
        }

        const vw = window.innerWidth;
        const vh = window.innerHeight;

        const pageFlip = new St.PageFlip(bookElement, {
            width: 1500,
            height: 2120,
            size: "stretch",
            showCover: true,
            drawShadow: true,
            // 縦横の自動判定に頼らず、幅が狭ければ強制的にportraitにする
            mode: (vw < 768) ? "portrait" : "landscape",
            mobileScrollSupport: true,
            clickEventForward: false, // ズーム操作を邪魔しないようにオフ
            useMouseEvents: true
        });

        pageFlip.loadFromHTML(document.querySelectorAll('.page'));
    };
</script>

</body>
</html>
