<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Solidus Digital Zine</title>
    <style>
        body, html { 
            margin: 0; padding: 0; 
            width: 100%; height: 100%;
            background-color: #f8f8f8;
            overflow: hidden; 
        }

        /* 横にスライドするエリア */
        .container {
            display: flex;
            width: 100vw;
            height: 100vh;
            overflow-x: auto;
            scroll-snap-type: x mandatory;
            -webkit-overflow-scrolling: touch;
        }

        /* 1ページ分の枠 */
        .page {
            flex: 0 0 100vw; 
            height: 100vh;
            display: flex;
            scroll-snap-align: start;
            box-sizing: border-box;
        }

        .page-img {
            display: block;
            object-fit: contain;
        }

        /* --- 縦向き：1枚表示 --- */
        @media (orientation: portrait) {
            .page {
                width: 100vw;
                justify-content: center;
                align-items: center;
                padding: 10px;
            }
            .page-img {
                max-width: 100%;
                max-height: 100%;
            }
        }

        /* --- 横向き：隙間なし見開き --- */
        @media (orientation: landscape) {
            .page {
                flex: 0 0 50vw;
                width: 50vw;
            }
            /* 左ページを右寄せ、右ページを左寄せ */
            .page:nth-child(odd) { justify-content: flex-end; }
            .page:nth-child(even) { justify-content: flex-start; }
            
            .page-img {
                width: auto;
                height: 100%;
                max-width: 100%;
            }
        }
    </style>
</head>
<body>

<div class="container">
