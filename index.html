<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Solidus Digital Zine</title>
    <style>
        body, html { 
            margin: 0; padding: 0; 
            width: 100%; height: 100%;
            background-color: #ebebeb; /* 背景を少し深くして高級感を */
            overflow: hidden; 
        }

        .container {
            display: flex;
            width: 100vw;
            height: 100vh;
            overflow-x: auto;
            scroll-snap-type: x mandatory;
            -webkit-overflow-scrolling: touch;
            /* スライドを滑らかにする */
            scroll-behavior: smooth;
        }

        .page {
            flex: 0 0 100vw; 
            height: 100vh;
            display: flex;
            scroll-snap-align: start;
            box-sizing: border-box;
        }

        .page-img {
            display: block;
            object-fit: contain;
            /* ページ単体に影をつけ、浮き上がった「紙」を表現 */
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            background-color: #fff;
        }

        /* --- 縦向き：中央に1枚 --- */
        @media (orientation: portrait) {
            .page {
                width: 100vw;
                justify-content: center;
                align-items: center;
                padding: 25px; /* 画面端に少し余裕を */
            }
            .page-img {
                max-width: 100%;
                max-height: 100%;
            }
        }

        /* --- 横向き：隙間なし・中綴じに影 --- */
        @media (orientation: landscape) {
            .page:first-child, .page:last-child {
                flex: 0 0 100vw;
                width: 100vw;
                justify-content: center;
                align-items: center;
            }

            .page:not(:first-child):not(:last-child) {
                flex: 0 0 50vw;
                width: 50vw;
            }

            .page:nth-child(even) { justify-content: flex-end; }
            .page:nth-child(odd):not(:first-child) { justify-content: flex-start; }
            
            .page-img {
                width: auto;
                height: 90%; /* 横画面でも少し上下に余裕を */
                max-width: 100%;
            }

            /* 本の中央の「溝」を表現するグラデーション影 */
            .page:nth-child(even) .page-img {
                border-right: 1px solid rgba(0,0,0,0.1);
                /* 右端（綴じ目側）にうっすら影を落とす */
                box-shadow: 10px 10px 30px rgba(0,0,0,0.1);
            }
            .page:nth-child(odd):not(:first-child) .page-img {
                /* 左端（綴じ目側）にうっすら影を落とす */
                box-shadow: -10px 10px 30px rgba(0,0,0,0.1);
            }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="page"><img src="page01.jpg" class="page-img"></div>
