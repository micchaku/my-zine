<!DOCTYPE html>

<html lang="ja">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NEO HAIR SYNDROME ZINE</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#111;
overflow:hidden;
}

.container{
display:flex;
height:100dvh;
overflow-x:auto;
scroll-snap-type:x mandatory;
}

/* 基本（スマホ縦） */

.page{
flex:0 0 100vw;
height:100dvh;

display:flex;
align-items:center;
justify-content:center;

scroll-snap-align:start;
}

.page img{
max-width:100%;
max-height:100%;
object-fit:contain;
}

/* 横画面 */

@media (orientation:landscape){

.page{
flex:0 0 calc(100vw / 2);
}

/* 表紙 */

.cover{
flex:0 0 100vw;
}

/* 画像 */

.page img{
width:100%;
height:100%;
object-fit:contain;
}

}

</style>

</head>

<body>

<div class="container">

<div class="page cover"><img src="page01.jpg"></div>

<div class="page"><img src="page02.jpg"></div>
