<!DOCTYPE html>

<title>NEO HAIR SYNDROME ZINE</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#111;
overflow:hidden;
font-family:Helvetica,Arial,sans-serif;
}

.container{
display:flex;
height:100dvh;
overflow-x:auto;
scroll-snap-type:x mandatory;
}

/* スプレッド */

.spread{
flex:0 0 100vw;
height:100dvh;

display:flex;
align-items:center;
justify-content:center;

scroll-snap-align:start;
}

/* 画像 */

.spread img{
height:100%;
width:auto;
max-width:50%;
display:block;
}

/* 表紙 */

.cover img{
max-width:100%;
}

/* スマホ */

@media (orientation:portrait){

.spread{
flex-direction:column;
}

.spread img{
max-width:100%;
height:auto;
}

}

.counter{
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);
color:white;
font-size:13px;
letter-spacing:2px;
opacity:0.7;
}

</style>

</head>

<div class="container" id="viewer">

<div class="spread cover">
