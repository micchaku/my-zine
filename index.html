<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Solidus Digital ZINE</title>

<style>
/* 基本設定 */
body {
    margin: 0;
    background: #111;
    overflow: hidden;
    font-family: sans-serif;
}

/* ビューワー本体 */
.viewer {
    display: flex;
    overflow-x: auto;
    overflow-y: hidden;
    scroll-snap-type: x mandatory;
    -webkit-overflow-scrolling: touch;
    width: 100vw;
    height: 100vh;
}

/* 各ページ */
.page {
    flex: 0 0 100vw;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    scroll-snap-align: start;
    position: relative;
}

/* 画像の表示設定 */
.page img {
    max-width: 100%;
    max-height: 100%;
    object-fit: contain;
    pointer-events: none;
    -webkit-user-select: none;
    user-select: none;
}

/* 【雑誌演出】見開きの中央に「ノド（影）」を入れる */
@media (orientation: landscape) {
    .page.spread::after {
        content: "";
        position: absolute;
        top: 0;
        left: 50%;
        transform: translateX(-50%);
        width: 15%; /* 影の広がりを少し強調 */
        height: 100%;
        background: linear-gradient(to right, rgba(0,0,0,0) 0%, rgba(0,0,0,0.25) 50%, rgba(0,0,0,0) 100%);
        pointer-events: none;
        z-index: 5;
    }
    .single { display: none; } /* 縦用画像を隠す */
}

@media (orientation: portrait) {
    .spread { display: none; } /* 横用画像を隠す */
}

/* スクロールバー非表示 */
.viewer::-webkit-scrollbar { display: none; }

/* 進捗バー */
.progress-container {
    position: fixed;
    bottom: 0;
    left: 0;
    width: 100%;
    height: 3px;
    background: rgba(255,255,255,0.1);
    z-index: 100;
}
.progress-bar {
    height: 100%;
    background: #fff;
    width: 0%;
    transition: width 0.1s ease-out;
}
</style>
</head>

<body>

<div class="progress-container">
    <div class="progress-bar" id="progressBar"></div>
</div>

<div class="viewer" id="zineViewer">

</div>

<script>
    const viewer = document.getElementById('zineViewer');
    const progressBar = document.getElementById('progressBar');

    // プログレスバー更新
    viewer.addEventListener('scroll', () => {
        const scrollLeft = viewer.scrollLeft;
        const scrollWidth = viewer.scrollWidth - viewer.clientWidth;
        const scrolled = (scrollLeft / scrollWidth) * 100;
        progressBar.style.width = scrolled + "%";
    });

    // 右クリック禁止
    document.addEventListener('contextmenu', e => e.preventDefault());
</script>

</body>
</html>
