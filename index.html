<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Solidus Digital Zine</title>
    <script src="https://cdn.jsdelivr.net/npm/page-flip@2.0.7/dist/js/page-flip.browser.min.js"></script>
    <style>
        body { 
            background-color: #f8f8f8; 
            margin: 0; 
            padding: 0;
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh;
            /* iOS Safariのツールバーに邪魔されない高さ設定 */
            height: -webkit-fill-available;
            overflow: hidden; 
        }

        .container { 
            width: 100%; 
            height: 100%; 
            display: flex; 
            justify-content: center; 
            align-items: center;
            padding: 10px;
            box-sizing: border-box;
        }

        #book { 
            box-shadow: 0 15px 45px rgba(0,0,0,0.1);
        }

        .page { 
            background-color: #fff; 
            width: 100%; 
            height: 100%; 
        }

        .page-img { 
            width: 100%; 
            height: 100%; 
            /* 画像を枠内に収め、絶対に切らせない設定 */
            object-fit: contain; 
            display: block; 
            pointer-events: none;
        }
    </style>
</head>
<body>

<div class="container" id="container">
    <div id="book">
        </div>
</div>

<script>
    let pageFlip = null;

    function initZine() {
        const bookElement = document.getElementById('book');
        
        // 既存の要素をクリア
        if (pageFlip) {
            pageFlip.destroy();
        }
        bookElement.innerHTML = '';

        // 32ページ生成
        for (let i = 1; i <= 32; i++) {
            const div = document.createElement('div');
            div.className = 'page';
            div.innerHTML = `<img src="page${i.toString().padStart(2, '0')}.jpg" class="page-img">`;
            bookElement.appendChild(div);
        }

        const vw = window.innerWidth;
        const vh = window.innerHeight;

        // 【最強の判定ロジック】
        // 画面が縦長(vh > vw)なら、問答無用で portrait（1枚）モード。
        // そうでなければ landscape（見開き）モード。
        const isPortrait = vh > vw;

        pageFlip = new St.PageFlip(bookElement, {
            width: 1500,
            height: 2120,
            size: "stretch", // 画面に合わせて伸縮
            showCover: true,
            drawShadow: true,
            flippingTime: 800,
            mode: isPortrait ? "portrait" : "landscape",
            autoSize: true,
            mobileScrollSupport: true,
            clickEventForward: false, // 拡大操作を優先
            useMouseEvents: true
        });

        pageFlip.loadFromHTML(document.querySelectorAll('.page'));
    }

    // 起動時
    window.onload = initZine;

    // 画面の向きが変わった時（回転させた時）に再構築
    let lastWidth = window.innerWidth;
    window.addEventListener('resize', () => {
        if (Math.abs(window.innerWidth - lastWidth) > 50) { // 誤動作防止の遊び
            lastWidth = window.innerWidth;
            initZine();
        }
    });
</script>

</body>
</html>
