<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Solidus Digital ZINE</title>
<style>
/* 1. 基本設定 */
body { margin: 0; padding: 0; background: #111; overflow: hidden; font-family: sans-serif; opacity: 0; animation: fadeInPage 1.5s ease forwards; }
@keyframes fadeInPage { from { opacity: 0; } to { opacity: 1; } }
.viewer { display: flex; overflow-x: auto; overflow-y: hidden; scroll-snap-type: x mandatory; -webkit-overflow-scrolling: touch; width: 100vw; height: 100vh; }
.viewer::-webkit-scrollbar { display: none; }
.page { flex: 0 0 100vw; height: 100vh; display: flex; align-items: center; justify-content: center; scroll-snap-align: start; position: relative; box-shadow: inset 10px 0 20px -10px rgba(0,0,0,0.5), inset -10px 0 20px -10px rgba(0,0,0,0.5); }
.page img { max-width: 100%; max-height: 100%; object-fit: contain; pointer-events: none; -webkit-user-select: none; user-select: none; }

/* 2. 【横向き】見開きの折り目演出 */
@media (orientation: landscape) {
    .page.spread::after {
        content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
        background: linear-gradient(to right, rgba(0,0,0,0) 0%, rgba(0,0,0,0) 40%, rgba(0,0,0,0.07) 49.8%, rgba(255,255,255,0.08) 50%, rgba(0,0,0,0) 50.1%, rgba(0,0,0,0) 100%);
        pointer-events: none; z-index: 5;
    }
    .single { display: none; }
}

/* 3. 【縦向き】ページ端の境界線演出 */
@media (orientation: portrait) {
    .page::after {
        content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
        background: linear-gradient(to right, rgba(0,0,0,0.1) 0%, rgba(0,0,0,0) 3%, rgba(0,0,0,0) 97%, rgba(0,0,0,0.1) 100%);
        pointer-events: none; z-index: 5;
    }
    .spread { display: none; }
}

/* 4. UIパーツ */
.progress-container { position: fixed; bottom: 0; left: 0; width: 100%; height: 2px; background: rgba(255,255,255,0.1); z-index: 100; }
.progress-bar { height: 100%; background: #ffffff; width: 0%; transition: width 0.1s ease-out; }
.guide-overlay { position: fixed; top: 50%; right: 15px; transform: translateY(-50%); color: #fff; font-size: 10px; letter-spacing: 0.15em; writing-mode: vertical-rl; text-shadow: 0 1px 3px rgba(0,0,0,0.3); background: rgba(0, 0, 0, 0.4); padding: 15px 6px; border-radius: 20px; backdrop-filter: blur(4px); opacity: 0.8; z-index: 1000; pointer-events: none; transition: opacity 0.5s ease; animation: bounceRight 2s infinite; }
@keyframes bounceRight { 0%, 100% { transform: translateY(-50%) translateX(0); } 50% { transform: translateY(-50%) translateX(-5px); } }
</style>
</head>
<body>
<div class="guide-overlay">SWIPE TO READ</div>
<div class="progress-container"><div class="progress-bar" id="progressBar"></div></div>
<div class="viewer" id="zineViewer">
    <div class="page"><img src="cover.jpg"></div>
    <div class="page spread"><img src="spread-02-03.jpg"></div>
    <div class="page spread"><img src="spread-04-05.jpg"></div>
    <div class="page spread"><img src="spread-06-07.jpg"></div>
    <div class="page spread"><img src="spread-08-09.jpg"></div>
    <div class="page spread"><img src="spread-10-11.jpg"></div>
    <div class="page spread"><img src="spread-12-13.jpg"></div>
    <div class="page spread"><img src="spread-14-15.jpg"></div>
    <div class="page spread"><img src="spread-16-17.jpg"></div>
    <div class="page spread"><img src="spread-18-19.jpg"></div>
    <div class="page spread"><img src="spread-20-21.jpg"></div>
    <div class="page spread"><img src="spread-22-23.jpg"></div>
    <div class="page spread"><img src="spread-24-25.jpg"></div>
    <div class="page spread"><img src="spread-26-27.jpg"></div>
    <div class="page spread"><img src="spread-28-29.jpg"></div>
    <div class="page spread"><img src="spread-30-31.jpg"></div>
    <div class="page single"><img src="page01.jpg"></div>
    <div class="page single"><img src="page02.jpg"></div>
    <div class="page single"><img src="page03.jpg"></div>
    <div class="page single"><img src="page04.jpg"></div>
    <div class="page single"><img src="page05.jpg"></div>
    <div class="page single"><img src="page06.jpg"></div>
    <div class="page single"><img src="page07.jpg"></div>
    <div class="page single"><img src="page08.jpg"></div>
    <div class="page single"><img src="page09.jpg"></div>
    <div class="page single"><img src="page10.jpg"></div>
    <div class="page single"><img src="page11.jpg"></div>
    <div class="page single"><img src="page12.jpg"></div>
    <div class="page single"><img src="page13.jpg"></div>
    <div class="page single"><img src="page14.jpg"></div>
    <div class="page single"><img src="page15.jpg"></div>
    <div class="page single"><img src="page16.jpg"></div>
    <div class="page single"><img src="page17.jpg"></div>
    <div class="page single"><img src="page18.jpg"></div>

    <div class="page single"><img src="page20.jpg"></div>

    <div class="page single"><img src="page22.jpg"></div>
    <div class="page single"><img src="page23.jpg"></div>

    <div class="page single"><img src="page30.jpg"></div>
    <div class="page single"><img src="page31.jpg"></div>
    <div class="page"><img src="back.jpg"></div>
</div>
<script>
    const viewer = document.getElementById('zineViewer');
    const progressBar = document.getElementById('progressBar');
    viewer.addEventListener('scroll', () => {
        const scrollLeft = viewer.scrollLeft;
        const scrollWidth = viewer.scrollWidth - viewer.clientWidth;
        const scrolled = (scrollLeft / scrollWidth) * 100;
        progressBar.style.width = scrolled + "%";
        if(scrollLeft > 50) { document.querySelector('.guide-overlay').style.opacity = "0"; }
    });
    window.addEventListener('load', () => {
        setTimeout(() => {
            viewer.scrollTo({ left: 150, behavior: 'smooth' });
            setTimeout(() => { viewer.scrollTo({ left: 0, behavior: 'smooth' }); }, 600);
        }, 1000);
    });
    document.addEventListener('contextmenu', e => e.preventDefault());
</script>
</body>
</html>
