<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Solidus Digital Zine</title>
    <script src="https://cdn.jsdelivr.net/npm/page-flip@2.0.7/dist/js/page-flip.browser.min.js"></script>
    <style>
        body { 
            background-color: #f4f4f4; 
            margin: 0; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            /* ピンチズームができるよう、親要素の固定を解除 */
            overflow: auto; 
        }

        .container { 
            width: 100vw; 
            height: 100vh; 
            display: flex; 
            justify-content: center; 
            align-items: center;
            /* ズーム時にコンテンツが消えないように設定 */
            min-height: -webkit-fill-available;
        }

        #book { 
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            margin: auto;
        }

        .page { 
            background-color: #fff; 
            width: 100%; 
            height: 100%; 
        }

        .page-img { 
            width: 100%; 
            height: 100%; 
            object-fit: contain; 
            display: block; 
            /* 画像自体のドラッグによるズーム阻害を防止 */
            pointer-events: none; 
        }
    </style>
</head>
<body>

<div class="container">
    <div id="book">
        </div>
</div>

<script>
    const bookElement = document.getElementById('book');
    
    for (let i = 1; i <= 32; i++) {
        const num = i.toString().padStart(2, '0');
        const pageDiv = document.createElement('div');
        pageDiv.className = 'page';
        pageDiv.innerHTML = `<img src="page${num}.jpg" class="page-img" loading="lazy">`;
        bookElement.appendChild(pageDiv);
    }

    window.onload = () => {
        const pageFlip = new St.PageFlip(bookElement, {
            width: 1500,
            height: 2120,
            size: "stretch", 
            minWidth: 200,
            maxWidth: 2000,
            minHeight: 282,
            maxHeight: 2828,
            showCover: true,
            drawShadow: true,
            flippingTime: 800,
            // 縦持ちなら1枚、横持ちなら見開きに自動で切り替える設定
            usePortrait: true, 
            autoSize: true,
            mobileScrollSupport: true,
            clickEventForward: true
        });

        pageFlip.loadFromHTML(document.querySelectorAll('.page'));

        // 画面リサイズ（回転）時に本の位置とサイズを再計算
        window.addEventListener('resize', () => {
            pageFlip.update();
        });
    };
</script>

</body>
</html>
