<!DOCTYPE html>

<html lang="ja">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NEO HAIR SYNDROME ZINE</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#111;
overflow:hidden;
font-family:sans-serif;
}

/* ビューア */

.viewer{
display:flex;
height:100vh;
overflow-x:auto;
scroll-snap-type:x mandatory;
-webkit-overflow-scrolling:touch;
}

.slide{
flex:0 0 100vw;
height:100vh;

display:flex;
align-items:center;
justify-content:center;

scroll-snap-align:start;
}

.slide img{
max-width:100%;
max-height:100%;
object-fit:contain;
}

/* スマホ縦 */

@media (orientation:portrait){

.slide img{
width:auto;
height:100%;
}

}

/* PC・スマホ横 */

@media (orientation:landscape){

.slide img{
width:100%;
height:auto;
}

}

</style>

</head>

<body>

<div class="viewer">

<!-- cover -->

<div class="slide">
<img src="cover.jpg">
</div>

<!-- spreads -->

<div class="slide">
<img src="spread-02-03.jpg">
</div>

<div class="slide">
<img src="spread-04-05.jpg">
</div>

<div class="slide">
<img src="spread-06-07.jpg">
</div>

<div class="slide">
<img src="spread-08-09.jpg">
</div>

<div class="slide">
<img src="spread-10-11.jpg">
</div>

<div class="slide">
<img src="spread-12-13.jpg">
</div>

<div class="slide">
<img src="spread-14-15.jpg">
</div>

<div class="slide">
<img src="spread-16-17.jpg">
</div>

<div class="slide">
<img src="spread-18-19.jpg">
</div>

<div class="slide">
<img src="spread-20-21.jpg">
</div>

<div class="slide">
<img src="spread-22-23.jpg">
</div>

<div class="slide">
<img src="spread-24-25.jpg">
</div>

<div class="slide">
<img src="spread-26-27.jpg">
</div>

<div class="slide">
<img src="spread-28-29.jpg">
</div>

<div class="slide">
<img src="spread-30-31.jpg">
</div>

<!-- back -->

<div class="slide">
<img src="back.jpg">
</div>

</div>

</body>
</html>
