<!DOCTYPE html>
<html lang="ja">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Solidus Digital Zine</title>

<style>

body{
margin:0;
background:#111;
overflow:hidden;
}

/* スクロールコンテナ */

.container{
display:flex;
width:100vw;
height:100vh;
overflow-x:auto;
scroll-snap-type:x mandatory;
scroll-behavior:smooth;
}

/* ページ */

.page{
flex-shrink:0;
scroll-snap-align:start;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
background:#111;
position:relative;
}

.page img{
width:100%;
height:100%;
object-fit:contain;
}

/* 縦（スマホ） */

@media (orientation:portrait){

.page{
width:100vw;
padding:10px;
box-sizing:border-box;
}

}

/* 横（見開き） */

@media (orientation:landscape){

.page{
width:50vw;
}

/* 表紙 */

.page:first-child{
width:100vw;
}

/* 裏表紙 */

.page:last-child{
width:100vw;
}

/* 見開き写真をつなぐ */

.page img{
object-fit:cover;
}

/* 冊子の中央影 */

.page:nth-child(even)::after{

content:"";
position:absolute;
right:-1px;
top:0;
width:8px;
height:100%;
background:linear-gradient(to right,
rgba(0,0,0,0.25),
rgba(0,0,0,0)
);

}

}

</style>

</head>

<body>

<div class="container">

<div class="page"><img src="page01.jpg"></div>
