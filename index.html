<!DOCTYPE html>
<html lang="ja">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NEO HAIR SYNDROME ZINE</title>

<style>

body{
margin:0;
background:#111;
font-family:Helvetica,Arial,sans-serif;
overflow:hidden;
}

/* 横スクロール */

.container{
display:flex;
width:100vw;
height:100vh;
overflow-x:auto;
scroll-snap-type:x mandatory;
scroll-behavior:smooth;
}

/* ページ */

.page{
flex-shrink:0;
scroll-snap-align:start;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
background:#111;
position:relative;
}

/* 画像 */

.page img{
height:100%;
width:auto;
max-width:100%;
}

/* ページ番号 */

.counter{

position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);

color:white;
font-size:14px;
letter-spacing:2px;
opacity:0.6;

}

/* スマホ縦 */

@media (orientation:portrait){

.page{
width:100vw;
padding:10px;
box-sizing:border-box;
}

}

/* PC・スマホ横 */

@media (orientation:landscape){

.page{
width:50vw;
}

/* 表紙 */

.page:first-child{
width:100vw;
}

/* 裏表紙 */

.page:last-child{
width:100vw;
}

/* ノド影 */

.page:nth-child(even)::after{

content:"";
position:absolute;
right:-1px;
top:0;
width:12px;
height:100%;

background:linear-gradient(
to right,
rgba(0,0,0,0.35),
rgba(0,0,0,0.15),
rgba(0,0,0,0)
);

pointer-events:none;

}

}

</style>

</head>

<body>

<div class="container" id="viewer">

<div class="page"><img src="page01.jpg"></div>
<div class="page"><img src="page02.jpg"></div>
<div class="page"><img src="page03.jpg"></div>
<div class="page"><img src="page04.jpg"></div>
<div class="page"><img src="page05.jpg"></div>
<div class="page"><img src="page06.jpg"></div>
<div class="page"><img src="page07.jpg"></div>
<div class="page"><img src="page08.jpg"></div>
<div class="page"><img src="page09.jpg"></div>
<div class="page"><img src="page10.jpg"></div>
<div class="page"><img src="page11.jpg"></div>
<div class="page"><img src="page12.jpg"></div>
<div class="page"><img src="page13.jpg"></div>
<div class="page"><img src="page14.jpg"></div>
<div class="page"><img src="page15.jpg"></div>
<div class="page"><img src="page16.jpg"></div>
<div class="page"><img src="page17.jpg"></div>
<div class="page"><img src="page18.jpg"></div>
<div class="page"><img src="page19.jpg"></div>
<div class="page"><img src="page20.jpg"></div>
<div class="page"><img src="page21.jpg"></div>
<div class="page"><img src="page22.jpg"></div>
<div class="page"><img src="page23.jpg"></div>
<div class="page"><img src="page24.jpg"></div>
<div class="page"><img src="page25.jpg"></div>
<div class="page"><img src="page26.jpg"></div>
<div class="page"><img src="page27.jpg"></div>
<div class="page"><img src="page28.jpg"></div>
<div class="page"><img src="page29.jpg"></div>
<div class="page"><img src="page30.jpg"></div>
<div class="page"><img src="page31.jpg"></div>
<div class="page"><img src="page32.jpg"></div>

</div>

<div class="counter" id="counter">1 / 32</div>

<script>

const viewer = document.getElementById("viewer");
const counter = document.getElementById("counter");
const pages = document.querySelectorAll(".page");

viewer.addEventListener("scroll", () => {

let scroll = viewer.scrollLeft;
let width = window.innerWidth;

let page = Math.round(scroll / width) + 1;

if(page < 1) page = 1;
if(page > pages.length) page = pages.length;

counter.innerText = page + " / " + pages.length;

});

</script>

</body>
</html>
