<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Solidus Digital Zine</title>
    <style>
        body { 
            background-color: #f8f8f8; 
            margin: 0; 
            overflow-x: hidden; 
            display: flex; 
            flex-direction: column; 
            align-items: center;
        }
        .container {
            width: 100vw;
            height: 100vh;
            display: flex;
            overflow-x: scroll;
            scroll-snap-type: x mandatory; /* 1枚ずつピタッと止まる設定 */
            -webkit-overflow-scrolling: touch;
        }
        .page {
            flex: 0 0 100vw; /* 常に画面の横幅いっぱいに1枚 */
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            scroll-snap-align: start;
        }
        .page-img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }
        /* ページ番号表示（任意） */
        .page-num {
            position: fixed;
            bottom: 15px;
            background: rgba(255,255,255,0.8);
            padding: 2px 10px;
            border-radius: 10px;
            font-size: 12px;
            color: #666;
        }
    </style>
</head>
<body>

<div class="container" id="zine-container">
    </div>

<div class="page-num" id="page-indicator">1 / 32</div>

<script>
    const container = document.getElementById('zine-container');
    const indicator = document.getElementById('page-indicator');

    // 32ページ生成
    for (let i = 1; i <= 32; i++) {
        const pageDiv = document.createElement('div');
        pageDiv.className = 'page';
        const img = document.createElement('img');
        img.src = `page${i.toString().padStart(2, '0')}.jpg`;
        img.className = 'page-img';
        pageDiv.appendChild(img);
        container.appendChild(pageDiv);
    }

    // 現在のページ数を表示する処理
    container.addEventListener('scroll', () => {
        const pageIndex = Math.round(container.scrollLeft / window.innerWidth) + 1;
        indicator.innerText = `${pageIndex} / 32`;
    });
</script>

</body>
</html>
