<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Solidus Digital Zine</title>
    <script src="https://cdn.jsdelivr.net/npm/page-flip@2.0.7/dist/js/page-flip.browser.min.js"></script>
    <style>
        body { 
            background-color: #f4f4f4; 
            margin: 0; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            overflow: hidden; 
        }

        .container { 
            /* 画面の95%に収まるように制限をかけます */
            width: 95vw; 
            height: 95vh; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
        }

        #book { 
            box-shadow: 0 10px 30px rgba(0,0,0,0.15); 
        }

        .page { 
            background-color: #fff; 
            width: 100%; 
            height: 100%; 
        }

        .page-img { 
            width: 100%; 
            height: 100%; 
            object-fit: contain; 
            display: block; 
        }

        /* 文字を表示させていた部分は削除しました */
    </style>
</head>
<body>

<div class="container">
    <div id="book">
        </div>
</div>

<script>
    const bookElement = document.getElementById('book');
    
    for (let i = 1; i <= 32; i++) {
        const num = i.toString().padStart(2, '0');
        const pageDiv = document.createElement('div');
        pageDiv.className = 'page';
        pageDiv.innerHTML = `<img src="page${num}.jpg" class="page-img" loading="lazy">`;
        bookElement.appendChild(pageDiv);
    }

    window.onload = () => {
        const pageFlip = new St.PageFlip(bookElement, {
            width: 1500,
            height: 2120,
            size: "stretch", // 画面に合わせて伸縮させる
            minWidth: 200,
            maxWidth: 1500,
            minHeight: 282,
            maxHeight: 2120,
            showCover: true,
            drawShadow: true,
            flippingTime: 800,
            usePortrait: true, // 縦向きなら1枚、横向きなら2枚に自動切替
            startPage: 0,
            autoSize: true, // 親要素のサイズに合わせて自動調整
            mobileScrollSupport: true
        });

        pageFlip.loadFromHTML(document.querySelectorAll('.page'));

        // 画面の向きを変えた時に、本のサイズを再計算して「収まるように」します
        window.addEventListener('resize', () => {
            pageFlip.update();
        });
    };
</script>

</body>
</html>
