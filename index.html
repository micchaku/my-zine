<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Solidus Digital Zine</title>
    <script src="https://cdn.jsdelivr.net/npm/page-flip@2.0.7/dist/js/page-flip.browser.min.js"></script>
    <style>
        body { background-color: #f8f8f8; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        .container { width: 100vw; height: 100vh; display: flex; justify-content: center; align-items: center; }
        #book { box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .page { background-color: #fff; width: 100%; height: 100%; }
        .page-img { width: 100%; height: 100%; object-fit: contain; display: block; }
    </style>
</head>
<body>
<div class="container" id="container"><div id="book"></div></div>

<script>
    let pageFlip = null;

    function init() {
        const bookElement = document.getElementById('book');
        if (pageFlip) { pageFlip.destroy(); bookElement.innerHTML = ''; }

        // ページ生成
        for (let i = 1; i <= 32; i++) {
            const div = document.createElement('div');
            div.className = 'page';
            div.innerHTML = `<img src="page${i.toString().padStart(2, '0')}.jpg" class="page-img">`;
            bookElement.appendChild(div);
        }

        const vw = window.innerWidth;
        const vh = window.innerHeight;

        // 【ここがポイント】
        // スマホ（幅が狭い、または縦長）の時は、強制的に 'portrait' モードを指定。
        // さらに、ライブラリが「見開きにしたい」と思わないように設定を固定します。
        const isMobile = (vw < 768) || (vh > vw);

        pageFlip = new St.PageFlip(bookElement, {
            width: 1500,
            height: 2120,
            size: "stretch",
            showCover: true,
            drawShadow: true,
            mode: isMobile ? "portrait" : "landscape",
            autoSize: true,
            mobileScrollSupport: true,
            // 2ページ表示を禁止する設定を追加
            usePortrait: isMobile, 
            startPage: 0
        });

        pageFlip.loadFromHTML(document.querySelectorAll('.page'));
    }

    window.onload = init;
    window.addEventListener('orientationchange', () => {
        setTimeout(init, 500); // 回転時は少し待ってから再構築
    });
</script>
</body>
</html>
