<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Solidus Digital Zine</title>
    <style>
        body, html { 
            margin: 0; padding: 0; 
            width: 100%; height: 100%;
            background-color: #f8f8f8;
            overflow: hidden; 
        }

        .container {
            display: flex;
            width: 100vw;
            height: 100vh;
            overflow-x: auto;
            scroll-snap-type: x mandatory;
            -webkit-overflow-scrolling: touch;
        }

        .page {
            flex: 0 0 100vw; 
            height: 100vh;
            display: flex;
            scroll-snap-align: start;
            box-sizing: border-box;
        }

        .page-img {
            display: block;
            object-fit: contain;
        }

        /* --- 縦向き：すべて1枚表示 --- */
        @media (orientation: portrait) {
            .page {
                width: 100vw;
                justify-content: center;
                align-items: center;
                padding: 10px;
            }
            .page-img {
                max-width: 100%;
                max-height: 100%;
            }
        }

        /* --- 横向き：表紙は1枚、次から見開き --- */
        @media (orientation: landscape) {
            /* 1枚目（表紙）と最後のページは、横画面でも中央に1枚だけ出す */
            .page:first-child, .page:last-child {
                flex: 0 0 100vw;
                width: 100vw;
                justify-content: center;
            }

            /* 2枚目〜31枚目までは、画面の半分（見開き）にする */
            .page:not(:first-child):not(:last-child) {
                flex: 0 0 50vw;
                width: 50vw;
            }

            /* 見開きの左側（偶数番目：2, 4, 6...）は右寄せ */
            /* 見開きの右側（奇数番目：3, 5, 7...）は左寄せ */
            /* これで表紙の次の「2ページ目と3ページ目」がピタッとくっつきます */
            .page:nth-child(even) { justify-content: flex-end; }
            .page:nth-child(odd):not(:first-child) { justify-content: flex-start; }
            
            .page-img {
                width: auto;
                height: 100%;
                max-width: 100%;
            }
        }
    </style>
</head>
