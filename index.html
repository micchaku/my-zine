<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Solidus Digital ZINE</title>

<style>
/* 1. 基本設定 */
body {
    margin: 0;
    padding: 0;
    background: #111;
    overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
    /* 開始時のふわっとした表示演出 */
    opacity: 0;
    animation: fadeInPage 1.5s ease forwards;
}

@keyframes fadeInPage {
    from { opacity: 0; }
    to { opacity: 1; }
}

/* 2. ビューワー */
.viewer {
    display: flex;
    overflow-x: auto;
    overflow-y: hidden;
    scroll-snap-type: x mandatory;
    -webkit-overflow-scrolling: touch;
    width: 100vw;
    height: 100vh;
}

/* 3. 各ページ */
.page {
    flex: 0 0 100vw;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    scroll-snap-align: start;
    position: relative;
}

/* 4. 画像保護 */
.page img {
    max-width: 100%;
    max-height: 100%;
    object-fit: contain;
    pointer-events: none;
    -webkit-user-select: none;
    user-select: none;
}

/* 5. 左ページのみに緩やかなグラデーション（Landscape時のみ） */
@media (orientation: landscape) {
    .page.spread::after {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: linear-gradient(to right, 
            rgba(0,0,0,0) 0%, 
            rgba(0,0,0,0) 30%, 
            rgba(0,0,0,0.07) 49.8%, 
            rgba(255,255,255,0.08) 50%, 
            rgba(0,0,0,0) 50.1%, 
            rgba(0,0,0,0) 100%
        );
        pointer-events: none;
        z-index: 5;
    }
    .single { display: none; }
}

/* 6. 縦向き設定 */
@media (orientation: portrait) {
    .spread { display: none; }
}

/* 7. UIパーツ */
.viewer::-webkit-scrollbar { display: none; }

.progress-container {
    position: fixed;
    bottom: 0;
    left: 0;
    width: 100%;
    height: 2px;
    background: rgba(255,255,255,0.1);
    z-index: 100;
}
.progress-bar {
    height: 100%;
    background: #ffffff;
    width: 0%;
    transition: width 0.1s ease-out;
}

/* 電子書籍ガイダンス表示 */
.guide-overlay {
    position: fixed;
    top: 50%;
    right: 20px;
    transform: translateY(-50%);
    color: #fff;
    font-size: 10px;
    letter-spacing: 0.2em;
    writing-mode: vertical-rl;
    opacity: 0.5;
    z-index: 1000;
    pointer-events: none;
    animation: bounceRight 2s infinite;
}

@keyframes bounceRight {
    0%, 100% { transform: translateY(-50%) translateX(0); }
    50% { transform: translateY(-50%) translateX(-10px); }
}
</style>
</head>

<body>

<div class="guide-overlay">SWIPE TO READ</div>

<div class="progress-container">
    <div class="progress-bar" id="progressBar"></div>
</div>

<div class="viewer" id="zineViewer">
    <div class="page"><img src="cover.jpg"></div>
    <div class="page spread"><img src="spread-02-03.jpg"></div>
    <div class="page spread"><img src="spread-04-05.jpg"></div>
    <div class="page spread"><img src="spread-06-07.jpg"></div>
    <div class="page spread"><img src="spread-08-09.jpg"></div>
    <div class="page spread"><img src="spread-10-11.jpg"></div>
    <div class="page spread"><img src="spread-12-13.jpg"></div>
    <div class="page spread"><img src="spread-14-15.jpg"></div>
    <div class="page spread"><img src="spread-16-17.jpg"></div>
    <div class="page spread"><img src="spread-18-19.jpg"></div>
    <div class="page spread"><img src="spread-20-21.jpg"></div>
    <div class="page spread"><img src="spread-22-23.jpg"></div>
    <div class="page spread"><img src="spread-24-25.jpg"></div>
    <div class="page spread"><img src="spread-26-27.jpg"></div>
    <div class="page spread"><img src="spread-28-29.jpg"></div>
    <div class="page spread"><img src="spread-30-31.jpg"></div>
    <div class="page single"><img src="page01.jpg"></div>
    <div class="page single"><img src="page02.jpg"></div>
    <div class="page single"><img src="page03.jpg"></div>
    <div class="page single"><img src="page04.jpg"></div>
    <div class="page single"><img src="page05.jpg"></div>
    <div class="page single"><img src="page06.jpg"></div>
    <div class="page single"><img src="page07.jpg"></div>
    <div class="page single"><img src="page08.jpg"></div>
    <div class="page single"><img src="page09.jpg"></div>
    <div class="page single"><img src="page10.jpg"></div>
    <div class="page single"><img src="page11.jpg"></div>
    <div class="page single"><img src="page12.jpg"></div>
    <div class="page single"><img src="page13.jpg"></div>
    <div class="page single"><img src="page14.jpg"></div>
    <div class="page single"><img src="page15.jpg"></div>
    <div class="page single"><img src="page16.jpg"></div>
    <div class="page single"><img src="page17.jpg"></div>
    <div class="page single"><img src="page18.jpg"></div>
    <div class="page single"><img src="page19.jpg"></div>
    <div class="page single"><img src="page20.jpg"></div>
    <div class="page single"><img src="page21.jpg"></div>
    <div class="page single"><img src="page22.jpg"></div>
    <div class="page single"><img src="page23.jpg"></div>
    <div class="page single"><img src="page24.jpg"></div>
    <div class="page single"><img src="page25.jpg"></div>
    <div class="page single"><img src="page26.jpg"></div>
    <div class="page single"><img src="page27.jpg"></div>
    <div class="page single"><img src="page28.jpg"></div>
    <div class="page single"><img src="page29.jpg"></div>
    <div class="page single"><img src="page30.jpg"></div>
    <div class="page single"><img src="page31.jpg"></div>
    <div class="page"><img src="back.jpg"></div>
</div>

<script>
    const viewer = document.getElementById('zineViewer');
    const progressBar = document.getElementById('progressBar');

    // 1. スクロール連動（プログレスバー）
    viewer.addEventListener('scroll', () => {
        const scrollLeft = viewer.scrollLeft;
        const scrollWidth = viewer.scrollWidth - viewer.clientWidth;
        const scrolled = (scrollLeft / scrollWidth) * 100;
        progressBar.style.width = scrolled + "%";
        
        // 一度でもスクロールしたらガイドを消す
        if(scrollLeft > 50) {
            document.querySelector('.guide-overlay').style.opacity = "0";
        }
    });

    // 2. 開いた瞬間の「チラ見せ（パラパラ）」ギミック
    window.addEventListener('load', () => {
        setTimeout(() => {
            // 300pxほど右に自動スクロールして、すぐ戻る
            viewer.scrollTo({ left: 150, behavior: 'smooth' });
            setTimeout(() => {
                viewer.scrollTo({ left: 0, behavior: 'smooth' });
            }, 600);
        }, 1000);
    });

    document.addEventListener('contextmenu', e => e.preventDefault());
</script>

</body>
</html>
