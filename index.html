<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Solidus Digital ZINE</title>

<style>
/* 1. 基本設定 */
body {
    margin: 0;
    padding: 0;
    background: #111;
    overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
}

/* 2. ビューワー */
.viewer {
    display: flex;
    overflow-x: auto;
    overflow-y: hidden;
    scroll-snap-type: x mandatory;
    -webkit-overflow-scrolling: touch;
    width: 100vw;
    height: 100vh;
}

/* 3. 各ページ */
.page {
    flex: 0 0 100vw;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    scroll-snap-align: start;
    position: relative;
}

/* 4. 画像保護 */
.page img {
    max-width: 100%;
    max-height: 100%;
    object-fit: contain;
    pointer-events: none;
    -webkit-user-select: none;
    user-select: none;
}

/* 5. 【修正】左ページのみに緩やかなグラデーション（Landscape時のみ） */
@media (orientation: landscape) {
    .page.spread::after {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        /* 左端から25%地点までは透明（元の色）、
           そこから中心（50%）にかけて、じわじわと薄い影を落とします。
           右半分（50.1%以降）は完全に透明（元の色）です。
        */
        background: linear-gradient(to right, 
            rgba(0,0,0,0) 0%, 
            rgba(0,0,0,0) 25%,        /* 左の半分（25%）までは元の色 */
            rgba(0,0,0,0.07) 49.8%,   /* 中心に向かって緩やかに影を濃くする */
            rgba(255,255,255,0.08) 50%, /* 境界線にだけわずかなハイライト */
            rgba(0,0,0,0) 50.1%,      /* 右ページは即座に透明に戻す */
            rgba(0,0,0,0) 100%
        );
        pointer-events: none;
        z-index: 5;
    }
    .single { display: none; }
}

/* 6. 縦向き設定 */
@media (orientation: portrait) {
    .spread { display: none; }
}

/* 7. UIパーツ */
.viewer::-webkit-scrollbar { display: none; }

.progress-container {
    position: fixed;
    bottom: 0;
    left: 0;
    width: 100%;
    height: 2px;
    background: rgba(255,255,255,0.1);
    z-index: 100;
}
.progress-bar {
    height: 100%;
    background: #ffffff;
    width: 0%;
    transition: width 0.1s ease-out;
}
</style>
</head>

<body>

<div class="progress-container">
    <div class="progress-bar" id="progressBar"></div>
</div>

<div class="viewer" id="zineViewer">

    <div class="page"><img src="cover.jpg"></div>

    <div class="page spread"><img src="spread-02-03.jpg"></div>

    <div class="page single"><img src="page05.jpg"></div>
    <div class="page single"><img src="page06.jpg"></div>
    <div class="page single"><img src="page07.jpg"></div>

    <div class="page"><img src="back.jpg"></div>

</div>

<script>
    const viewer = document.getElementById('zineViewer');
    const progressBar = document.getElementById('progressBar');

    viewer.addEventListener('scroll', () => {
        const scrollLeft = viewer.scrollLeft;
        const scrollWidth = viewer.scrollWidth - viewer.clientWidth;
        const scrolled = (scrollLeft / scrollWidth) * 100;
        progressBar.style.width = scrolled + "%";
    });

    document.addEventListener('contextmenu', e => e.preventDefault());
</script>

</body>
</html>
