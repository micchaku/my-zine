<!DOCTYPE html>
<html lang="ja">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NEO HAIR SYNDROME ZINE</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#111;
overflow:hidden;
font-family:Helvetica,Arial,sans-serif;
}

/* 横スクロール */

.container{
display:flex;
height:100vh;
overflow-x:auto;
scroll-snap-type:x mandatory;
scroll-behavior:smooth;

gap:0;                 /* ← 空白防止 */
}

/* ページ */

.page{

flex:0 0 auto;         /* ← 幅固定 */

scroll-snap-align:start;

display:flex;
justify-content:center;
align-items:center;

height:100vh;
background:#111;

position:relative;
}

/* 画像 */

.page img{

height:100vh;
width:auto;

display:block;        /* ← 画像隙間防止 */

}

/* スマホ縦 */

@media (orientation:portrait){

.page{
width:100vw;
padding:10px;
}

}

/* PC・横画面 */

@media (orientation:landscape){

.page{
width:50vw;
}

/* 表紙 */

.page:first-child{
width:100vw;
}

/* 裏表紙 */

.page:last-child{
width:100vw;
}

/* ノド影 */

.page:nth-child(even)::after{

content:"";
position:absolute;
top:0;
right:-1px;

width:10px;
height:100%;

background:linear-gradient(
to right,
rgba(0,0,0,0.35),
rgba(0,0,0,0.15),
rgba(0,0,0,0)
);

}

}

</style>

</head>

<body>

<div class="container">

<div class="page"><img src="page01.jpg"></div>
<div class="page"><img src="page02.jpg"></div>
<div class="page"><img src="page03.jpg"></div>
