<!DOCTYPE html>

<html lang="ja">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>ZINE</title>

<style>

body{
margin:0;
background:#000;
}

/* 横スクロール */

.viewer{
display:flex;
overflow-x:auto;
scroll-snap-type:x mandatory;
-webkit-overflow-scrolling:touch;
}

.page{
flex:0 0 100vw;
height:100vh;

display:flex;
align-items:center;
justify-content:center;

scroll-snap-align:start;
}

.page img{
max-width:100%;
max-height:100%;
object-fit:contain;
}

/* 縦スマホ */

@media (orientation:portrait){

.spread{
display:none;
}

}

/* PC・スマホ横 */

@media (orientation:landscape){

.single{
display:none;
}

}

</style>

</head>

<body>

<div class="viewer">

<div class="page">
<img src="cover.jpg">
</div>
