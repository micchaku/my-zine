<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Solidus Digital Zine</title>
    <style>
        body, html { 
            margin: 0; padding: 0; 
            width: 100%; height: 100%;
            background-color: #f0f0f0; /* 背景を少し落ち着いた色に */
            overflow: hidden; 
        }

        .container {
            display: flex;
            width: 100vw;
            height: 100vh;
            overflow-x: auto;
            scroll-snap-type: x mandatory;
            -webkit-overflow-scrolling: touch;
            scroll-behavior: smooth;
        }

        .page {
            flex: 0 0 100vw; 
            height: 100vh;
            display: flex;
            scroll-snap-align: start;
            box-sizing: border-box;
            /* めくるような重なりを作るための設定 */
            position: sticky;
            left: 0;
            background-color: #f0f0f0;
        }

        .page-img {
            display: block;
            object-fit: contain;
            /* ページに立体感を出すための薄い影 */
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
            transition: transform 0.3s ease;
        }

        /* --- 縦向き：1枚表示 ＆ フェード効果 --- */
        @media (orientation: portrait) {
            .page {
                width: 100vw;
                justify-content: center;
                align-items: center;
                padding: 20px;
            }
            .page-img {
                max-width: 100%;
                max-height: 100%;
            }
        }

        /* --- 横向き：表紙は1枚、次から見開き ＆ 重なり効果 ---
