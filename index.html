<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Solidus Digital Zine</title>
    <script src="https://cdn.jsdelivr.net/npm/page-flip@2.0.7/dist/js/page-flip.browser.min.js"></script>
    <style>
        /* 背景色をSolidusの世界観に。高級感のある非常に薄いグレー */
        body { 
            background-color: #f8f8f8; 
            margin: 0; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            overflow: auto; /* ピンチズーム後のスクロール用 */
        }

        /* 本を囲むエリア。画面の高さ・幅いっぱいに使う */
        .container { 
            width: 100vw; 
            height: 100vh; 
            display: flex; 
            justify-content: center; 
            align-items: center;
            padding: 20px; /* 端に少しだけ余白を作って美しく */
            box-sizing: border-box;
        }

        #book { 
            box-shadow: 0 15px 45px rgba(0,0,0,0.1); /* 柔らかい影 */
            margin: auto;
        }

        .page { 
            background-color: #fff; 
            width: 100%; 
            height: 100%; 
        }

        .page-img { 
            width: 100%; 
            height: 100%; 
            object-fit: contain; 
            display: block; 
            pointer-events: none; /* 拡大操作を邪魔しない設定 */
        }
    </style>
</head>
<body>

<div class="container">
    <div id="book">
        </div>
</div>

<script>
    const bookElement = document.getElementById('book');
    
    for (let i = 1; i <= 32; i++) {
        const num = i.toString().padStart(2, '0');
        const pageDiv = document.createElement('div');
        pageDiv.className = 'page';
        pageDiv.innerHTML = `<img src="page${num}.jpg" class="page-img" loading="lazy">`;
        bookElement.appendChild(pageDiv);
    }

    window.onload = () => {
        const pageFlip = new St.PageFlip(bookElement, {
            width: 1500,     // 画像の元の幅
            height: 2120,    // 画像の元の高さ
            size: "stretch", // 画面に合わせて可変
            minWidth: 250,
            maxWidth: 2000,
            minHeight: 353,
            maxHeight: 2828,
            showCover: true, // 表紙を1枚にする
            drawShadow: true,
            flippingTime: 800,
            usePortrait: true, // 縦持ちは1枚、横持ちは2枚（見開き）に自動切替
            startPage: 0,
            autoSize: true,
            mobileScrollSupport: true,
            clickEventForward: true
        });

        pageFlip.loadFromHTML(document.querySelectorAll('.page'));

        // 画面の向きを変えた時やサイズ変更時に再計算
        window.addEventListener('resize', () => {
            pageFlip.update();
        });
    };
</script>

</body>
</html>
