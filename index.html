<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Solidus Digital Zine</title>
    <style>
        body { 
            background-color: #f8f8f8; 
            margin: 0; 
            overflow: hidden; 
        }
        /* スライドコンテナ */
        .container {
            width: 100vw;
            height: 100vh;
            display: flex;
            overflow-x: auto;
            scroll-snap-type: x mandatory;
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
        }
        .page {
            display: flex;
            justify-content: center;
            align-items: center;
            scroll-snap-align: start;
            flex-shrink: 0;
        }
        .page-img {
            max-width: 95%;
            max-height: 90%;
            object-fit: contain;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            background-color: #fff;
        }

        /* --- ここが魔法の切り替え設定 --- */

        /* 【縦向きの時】 1ページを画面幅100%にする */
        @media (orientation: portrait) {
            .page {
                width: 100vw;
            }
        }

        /* 【横向きの時】 1ページを画面幅50%（＝見開き）にする */
        @media (orientation: landscape) {
            .page {
                width: 50vw;
            }
            /* 横向きの時はスナップ（ピタッと止まる位置）を調整 */
            .container {
                scroll-snap-type: x proximity;
            }
        }

        .page-num {
            position: fixed;
            bottom: 25px;
            right: 25px;
            background: rgba(255,255,255,0.9);
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 12px;
            color: #333;
            pointer-events: none;
            z-index: 100;
        }
    </style>
</head>
<body>

<div class="container" id="container"></div>
<div class="page-num" id="indicator">01 / 32</div>

<script>
    const container = document.getElementById('container');
    const indicator = document.getElementById('indicator');

    for (let i = 1; i <= 32; i++) {
        const page = document.createElement('div');
        page.className = 'page';
        const img = document.createElement('img');
        img.src = `page${i.toString().padStart(2, '0')}.jpg`;
        img.className = 'page-img';
        page.appendChild(img);
        container.appendChild(page);
    }

    container.addEventListener('scroll', () => {
        // 縦横で1ページあたりの幅が違うので計算を分ける
        const pageWidth = (window.innerHeight > window.innerWidth) ? window.innerWidth : (window.innerWidth / 2);
        const index = Math.round(container.scrollLeft / pageWidth) + 1;
        indicator.innerText = `${index.toString().padStart(2, '0')} / 32`;
    });
</script>

</body>
</html>
